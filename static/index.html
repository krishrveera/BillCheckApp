<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedClear — Deterministic Medical Bill Verification</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e17;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 0 30px;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5rem; color: #f8fafc; letter-spacing: -1px; }
        .header h1 span { color: #22d3ee; }
        .header p { color: #94a3b8; margin-top: 8px; font-size: 1.05rem; }
        .header .differentiator {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 16px;
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 20px;
            font-size: 0.85rem;
            color: #22d3ee;
        }

        /* Patient Cards */
        .patients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .patient-card {
            background: #131a2b;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .patient-card:hover { border-color: #22d3ee; transform: translateY(-2px); }
        .patient-card.selected { border-color: #22d3ee; background: #0f1829; }
        .patient-card h3 { font-size: 1.2rem; margin-bottom: 8px; }
        .patient-card .mrn { color: #64748b; font-size: 0.85rem; margin-bottom: 12px; }
        .patient-card .details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9rem; }
        .patient-card .detail-label { color: #64748b; }
        .patient-card .detail-value { color: #cbd5e1; }
        .patient-card .total { font-size: 1.3rem; color: #f8fafc; font-weight: 700; margin-top: 12px; }
        .error-badge {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        /* Verify Button */
        .verify-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 30px;
            padding: 16px 32px;
            background: linear-gradient(135deg, #0891b2, #22d3ee);
            color: #0a0e17;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .verify-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(34, 211, 238, 0.3); }
        .verify-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .verify-btn.loading { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* Score Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        .dash-card {
            background: #131a2b;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .dash-card .label { color: #64748b; font-size: 0.85rem; margin-bottom: 6px; }
        .dash-card .value { font-size: 2rem; font-weight: 700; }
        .dash-card .sub { color: #64748b; font-size: 0.8rem; margin-top: 4px; }
        .score-a { color: #22c55e; }
        .score-b { color: #84cc16; }
        .score-c { color: #eab308; }
        .score-d { color: #f97316; }
        .score-f { color: #ef4444; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 0;
            border-bottom: 1px solid #1e293b;
        }
        .tab {
            padding: 12px 24px;
            background: #0f1520;
            color: #64748b;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            border-radius: 8px 8px 0 0;
        }
        .tab:hover { color: #e2e8f0; }
        .tab.active { background: #131a2b; color: #22d3ee; border-bottom: 2px solid #22d3ee; }

        /* Tab Content */
        .tab-content {
            background: #131a2b;
            border: 1px solid #1e293b;
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 24px;
            min-height: 300px;
        }

        /* Issues Table */
        .issues-table { width: 100%; border-collapse: collapse; }
        .issues-table th {
            text-align: left;
            padding: 10px 12px;
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #1e293b;
        }
        .issues-table td { padding: 12px; border-bottom: 1px solid #1a2235; vertical-align: top; }
        .issues-table tr:hover { background: rgba(34, 211, 238, 0.03); }

        .severity-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .severity-critical { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .severity-warning { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        .severity-info { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }

        .issue-details { color: #94a3b8; font-size: 0.85rem; margin-top: 4px; }
        .flagged-amount { color: #f87171; font-weight: 600; }

        /* Bill Table */
        .bill-table { width: 100%; border-collapse: collapse; }
        .bill-table th {
            text-align: left;
            padding: 10px 12px;
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 1px solid #1e293b;
        }
        .bill-table td { padding: 10px 12px; border-bottom: 1px solid #1a2235; }
        .bill-table tr.flagged { background: rgba(239, 68, 68, 0.08); }
        .bill-table tr.flagged td:first-child { border-left: 3px solid #ef4444; }

        /* Preformatted text */
        .preformatted {
            white-space: pre-wrap;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #cbd5e1;
            background: #0a0e17;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #1e293b;
            max-height: 600px;
            overflow-y: auto;
        }

        /* Answer Key */
        .answer-key { list-style: none; padding: 0; }
        .answer-key li {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 8px;
            font-size: 0.9rem;
            color: #fbbf24;
        }
        .answer-key li::before { content: "🎯 "; }

        /* Loading */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1e293b;
            border-top-color: #22d3ee;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Pipeline diagram */
        .pipeline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .pipeline-step {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .pipeline-step.ai { background: rgba(139, 92, 246, 0.15); border: 1px solid rgba(139, 92, 246, 0.3); color: #a78bfa; }
        .pipeline-step.deterministic { background: rgba(34, 211, 238, 0.15); border: 1px solid rgba(34, 211, 238, 0.3); color: #22d3ee; }
        .pipeline-arrow { color: #475569; font-size: 1.2rem; }

        /* Upload Section */
        .upload-section {
            margin-bottom: 30px;
            padding: 30px;
            background: #131a2b;
            border: 2px dashed #1e293b;
            border-radius: 12px;
            text-align: center;
            transition: all 0.2s;
            position: relative;
        }
        .upload-section.dragover { border-color: #22d3ee; background: rgba(34, 211, 238, 0.05); }
        .upload-section h3 { color: #f8fafc; margin-bottom: 8px; font-size: 1.1rem; }
        .upload-section p { color: #64748b; font-size: 0.9rem; margin-bottom: 16px; }
        .upload-input { display: none; }
        .upload-label {
            display: inline-block;
            padding: 12px 28px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #a78bfa;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .upload-label:hover { background: rgba(139, 92, 246, 0.25); border-color: #a78bfa; }
        .upload-preview {
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .upload-preview img {
            max-height: 120px;
            border-radius: 8px;
            border: 1px solid #1e293b;
        }
        .upload-filename {
            color: #cbd5e1;
            font-size: 0.9rem;
        }
        .upload-verify-btn {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 28px;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-verify-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3); }
        .upload-verify-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .upload-verify-btn.loading { animation: pulse 1.5s ease-in-out infinite; }

        .section-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 30px 0;
            color: #475569;
            font-size: 0.85rem;
        }
        .section-divider::before, .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1e293b;
        }

        .extraction-info {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .extraction-info .info-chip {
            padding: 4px 12px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            font-size: 0.8rem;
            color: #a78bfa;
        }

        .upload-error {
            margin-top: 12px;
            padding: 10px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #f87171;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: repeat(2, 1fr); }
            .patients-grid { grid-template-columns: 1fr; }
            .tabs { overflow-x: auto; }
        }

        /* Auth */
        .auth-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
        }
        .auth-bar .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .auth-bar .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #22d3ee;
        }
        .auth-btn {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .auth-btn.login {
            background: linear-gradient(135deg, #0891b2, #22d3ee);
            color: #0a0e17;
        }
        .auth-btn.login:hover { box-shadow: 0 2px 12px rgba(34, 211, 238, 0.3); }
        .auth-btn.logout {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
        }
        .auth-btn.logout:hover { border-color: #64748b; color: #e2e8f0; }
        .login-screen {
            text-align: center;
            padding: 80px 20px;
        }
        .login-screen h2 { font-size: 1.8rem; margin-bottom: 12px; color: #f8fafc; }
        .login-screen p { color: #94a3b8; margin-bottom: 30px; }
        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: #fff;
            color: #1f2937;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .google-btn:hover { box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
        .google-btn svg { width: 20px; height: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [patients, setPatients] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            const [report, setReport] = useState(null);
            const [knownErrors, setKnownErrors] = useState([]);
            const [latency, setLatency] = useState(null);
            const [loading, setLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('issues');
            const [patientBill, setPatientBill] = useState(null);
            const [authState, setAuthState] = useState({ loading: true, authenticated: false, user: null, oauthConfigured: false });
            const [uploadFile, setUploadFile] = useState(null);
            const [uploadPreview, setUploadPreview] = useState(null);
            const [uploadLoading, setUploadLoading] = useState(false);
            const [uploadError, setUploadError] = useState(null);
            const [extractionMs, setExtractionMs] = useState(null);
            const [verificationMs, setVerificationMs] = useState(null);
            const [isUploadResult, setIsUploadResult] = useState(false);
            const [dragover, setDragover] = useState(false);

            // Check auth status on mount
            useEffect(() => {
                fetch('/auth/status')
                    .then(r => r.json())
                    .then(data => {
                        setAuthState({
                            loading: false,
                            authenticated: data.authenticated,
                            user: data.user,
                            oauthConfigured: data.oauth_configured,
                        });
                    })
                    .catch(() => setAuthState({ loading: false, authenticated: false, user: null, oauthConfigured: false }));
            }, []);

            useEffect(() => {
                // Only fetch patients when authenticated (or OAuth not configured)
                if (authState.loading) return;
                if (authState.oauthConfigured && !authState.authenticated) return;
                fetch('/api/patients')
                    .then(r => {
                        if (r.status === 401) {
                            setAuthState(prev => ({ ...prev, authenticated: false }));
                            return null;
                        }
                        return r.json();
                    })
                    .then(data => data && setPatients(data.patients));
            }, [authState.loading, authState.authenticated]);

            const selectPatient = (id) => {
                setSelectedId(id);
                setReport(null);
                setLatency(null);
                setActiveTab('issues');
                setIsUploadResult(false);
                setUploadFile(null);
                setUploadPreview(null);
                setUploadError(null);
                fetch(`/api/patients/${id}`)
                    .then(r => r.json())
                    .then(data => {
                        setPatientBill(data.bill);
                        setKnownErrors(data.known_errors);
                    });
            };

            const handleFileSelect = (file) => {
                if (!file) return;
                const allowed = ['image/png', 'image/jpeg', 'image/jpg', 'image/webp', 'image/gif'];
                if (!allowed.includes(file.type)) {
                    setUploadError('Please upload a PNG, JPEG, or WebP image.');
                    return;
                }
                setUploadFile(file);
                setUploadError(null);
                setReport(null);
                setSelectedId(null);
                setIsUploadResult(false);
                const reader = new FileReader();
                reader.onload = (e) => setUploadPreview(e.target.result);
                reader.readAsDataURL(file);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragover(false);
                if (e.dataTransfer.files.length > 0) {
                    handleFileSelect(e.dataTransfer.files[0]);
                }
            };

            const runUploadVerification = async () => {
                if (!uploadFile) return;
                setUploadLoading(true);
                setUploadError(null);
                try {
                    const formData = new FormData();
                    formData.append('file', uploadFile);
                    const res = await fetch('/api/verify-upload', { method: 'POST', body: formData });
                    if (!res.ok) {
                        let errorMsg = `Server error (${res.status})`;
                        try {
                            const err = await res.json();
                            errorMsg = err.detail || errorMsg;
                        } catch {
                            const text = await res.text();
                            if (text) errorMsg = text;
                        }
                        throw new Error(errorMsg);
                    }
                    const data = await res.json();
                    setReport(data.report);
                    setPatientBill(data.bill);
                    setKnownErrors([]);
                    setLatency(data.latency_ms);
                    setExtractionMs(data.extraction_ms);
                    setVerificationMs(data.verification_ms);
                    setIsUploadResult(true);
                    setActiveTab('issues');
                } catch (err) {
                    console.error(err);
                    setUploadError(err.message);
                } finally {
                    setUploadLoading(false);
                }
            };

            const runVerification = async () => {
                if (!selectedId) return;
                setLoading(true);
                setIsUploadResult(false);
                try {
                    const res = await fetch(`/api/verify/${selectedId}`, { method: 'POST' });
                    const data = await res.json();
                    setReport(data.report);
                    setKnownErrors(data.known_errors);
                    setLatency(data.latency_ms);
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const gradeClass = (grade) => {
                const map = { A: 'score-a', B: 'score-b', C: 'score-c', D: 'score-d', F: 'score-f' };
                return map[grade] || '';
            };

            const criticalCount = report ? report.issues.filter(i => i.severity === 'critical').length : 0;
            const warningCount = report ? report.issues.filter(i => i.severity === 'warning').length : 0;

            const flaggedIndices = report ? new Set(report.issues.map(i => i.line_item_index).filter(i => i !== null)) : new Set();

            return (
                <div className="container">
                    {/* Auth bar */}
                    <div className="auth-bar">
                        {authState.oauthConfigured && authState.authenticated && authState.user && (
                            <>
                                <div className="user-info">
                                    {authState.user.picture && <img className="user-avatar" src={authState.user.picture} alt="" />}
                                    <span>{authState.user.name || authState.user.email}</span>
                                </div>
                                <a href="/auth/logout" className="auth-btn logout">Sign Out</a>
                            </>
                        )}
                    </div>

                    {/* Login screen when OAuth is configured but user isn't authenticated */}
                    {authState.oauthConfigured && !authState.authenticated && !authState.loading && (
                        <div className="login-screen">
                            <h1 style={{fontSize: '2.5rem', marginBottom: '8px'}}>Bill<span style={{color: '#22d3ee'}}>Check</span></h1>
                            <p style={{maxWidth: '500px', margin: '0 auto 30px'}}>
                                Deterministic Medical Bill Verification — sign in to get started.
                            </p>
                            <a href="/auth/login" style={{textDecoration: 'none'}}>
                                <button className="google-btn">
                                    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                                    Sign in with Google
                                </button>
                            </a>
                        </div>
                    )}

                    {/* Main app (shown when authenticated OR OAuth not configured) */}
                    {(!authState.oauthConfigured || authState.authenticated) && !authState.loading && (
                    <>
                    <div className="header">
                        <h1>Med<span>Clear</span></h1>
                        <p>Deterministic Medical Bill Verification</p>
                        <div className="differentiator">
                            LLM extracts the bill &bull; Pure logic checks the rules &bull; Verification cannot hallucinate
                        </div>
                        <div className="pipeline">
                            <span className="pipeline-step ai">LLM Extraction</span>
                            <span className="pipeline-arrow">&rarr;</span>
                            <span className="pipeline-step deterministic">Duplicates</span>
                            <span className="pipeline-arrow">&rarr;</span>
                            <span className="pipeline-step deterministic">Dates</span>
                            <span className="pipeline-arrow">&rarr;</span>
                            <span className="pipeline-step deterministic">Math</span>
                            <span className="pipeline-arrow">&rarr;</span>
                            <span className="pipeline-step deterministic">CMS Rates</span>
                            <span className="pipeline-arrow">&rarr;</span>
                            <span className="pipeline-step deterministic">Unbundling</span>
                            <span className="pipeline-arrow">&rarr;</span>
                            <span className="pipeline-step deterministic">Plausibility</span>
                        </div>
                    </div>

                    <div className="patients-grid">
                        {patients.map(p => (
                            <div
                                key={p.id}
                                className={`patient-card ${selectedId === p.id ? 'selected' : ''}`}
                                onClick={() => selectPatient(p.id)}
                            >
                                <h3>{p.name}</h3>
                                <div className="mrn">MRN: {p.mrn} &bull; {p.facility}</div>
                                <div className="details">
                                    <div>
                                        <div className="detail-label">Admitted</div>
                                        <div className="detail-value">{p.admission_date}</div>
                                    </div>
                                    <div>
                                        <div className="detail-label">Discharged</div>
                                        <div className="detail-value">{p.discharge_date}</div>
                                    </div>
                                    <div>
                                        <div className="detail-label">Diagnosis</div>
                                        <div className="detail-value">{p.primary_diagnosis}</div>
                                    </div>
                                    <div>
                                        <div className="detail-label">Line Items</div>
                                        <div className="detail-value">{p.line_items_count}</div>
                                    </div>
                                </div>
                                <div className="total">${p.total_billed.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
                                <div className="error-badge">{p.known_error_count} known errors embedded</div>
                            </div>
                        ))}
                    </div>

                    <button
                        className={`verify-btn ${loading ? 'loading' : ''}`}
                        onClick={runVerification}
                        disabled={!selectedId || loading}
                    >
                        {loading ? (<><span className="spinner"></span>Running 6 Deterministic Engines...</>) : 'Verify Selected Bill'}
                    </button>

                    <div className="section-divider">OR UPLOAD YOUR OWN BILL</div>

                    <div
                        className={`upload-section ${dragover ? 'dragover' : ''}`}
                        onDragOver={(e) => { e.preventDefault(); setDragover(true); }}
                        onDragLeave={() => setDragover(false)}
                        onDrop={handleDrop}
                    >
                        <h3>Upload a Medical Bill Image</h3>
                        <p>PNG, JPEG, or WebP — Claude Vision will extract line items, then 6 deterministic engines verify</p>
                        <label className="upload-label" htmlFor="bill-upload">
                            Choose Image
                        </label>
                        <input
                            id="bill-upload"
                            className="upload-input"
                            type="file"
                            accept="image/png,image/jpeg,image/webp,image/gif"
                            onChange={(e) => handleFileSelect(e.target.files[0])}
                        />
                        {uploadPreview && (
                            <div className="upload-preview">
                                <img src={uploadPreview} alt="Bill preview" />
                                <span className="upload-filename">{uploadFile?.name}</span>
                            </div>
                        )}
                        {uploadError && <div className="upload-error">{uploadError}</div>}
                        {uploadFile && (
                            <div>
                                <button
                                    className={`upload-verify-btn ${uploadLoading ? 'loading' : ''}`}
                                    onClick={runUploadVerification}
                                    disabled={uploadLoading}
                                >
                                    {uploadLoading ? (<><span className="spinner"></span>Extracting &amp; Verifying...</>) : 'Extract & Verify'}
                                </button>
                            </div>
                        )}
                    </div>

                    {report && (
                        <>
                            <div className="dashboard">
                                <div className="dash-card">
                                    <div className="label">Safety Score</div>
                                    <div className={`value ${gradeClass(report.grade)}`}>{report.safety_score}</div>
                                    <div className="sub">Grade: {report.grade}</div>
                                </div>
                                <div className="dash-card">
                                    <div className="label">Issues Found</div>
                                    <div className="value" style={{color: '#f87171'}}>{report.issues.length}</div>
                                    <div className="sub">{criticalCount} critical, {warningCount} warnings</div>
                                </div>
                                <div className="dash-card">
                                    <div className="label">Total Flagged</div>
                                    <div className="value flagged-amount">${report.total_flagged.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
                                    <div className="sub">potential overcharges</div>
                                </div>
                                <div className="dash-card">
                                    <div className="label">{isUploadResult ? 'Total Time' : 'Verification Time'}</div>
                                    <div className="value" style={{color: '#22d3ee'}}>{latency}ms</div>
                                    <div className="sub">
                                        {isUploadResult
                                            ? `extraction: ${extractionMs}ms + verification: ${verificationMs}ms`
                                            : 'pure deterministic logic'}
                                    </div>
                                </div>
                            </div>

                            {isUploadResult && (
                                <div className="extraction-info">
                                    <span className="info-chip">Extracted via Claude Vision</span>
                                    <span className="info-chip">Patient: {report.patient_name}</span>
                                    <span className="info-chip">Facility: {report.facility_name}</span>
                                </div>
                            )}

                            <div className="tabs">
                                {['issues', 'bill', 'dispute', 'phone', ...(isUploadResult ? [] : ['answer-key'])].map(tab => (
                                    <button
                                        key={tab}
                                        className={`tab ${activeTab === tab ? 'active' : ''}`}
                                        onClick={() => setActiveTab(tab)}
                                    >
                                        {tab === 'issues' ? `Issues (${report.issues.length})` :
                                         tab === 'bill' ? 'Full Bill' :
                                         tab === 'dispute' ? 'Dispute Letter' :
                                         tab === 'phone' ? 'Phone Script' :
                                         'Answer Key'}
                                    </button>
                                ))}
                            </div>

                            <div className="tab-content">
                                {activeTab === 'issues' && (
                                    <table className="issues-table">
                                        <thead>
                                            <tr>
                                                <th>Severity</th>
                                                <th>CPT</th>
                                                <th>Issue Type</th>
                                                <th>Description</th>
                                                <th>Flagged Amount</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {[...report.issues]
                                                .sort((a, b) => {
                                                    const order = { critical: 0, warning: 1, info: 2 };
                                                    return order[a.severity] - order[b.severity];
                                                })
                                                .map((issue, idx) => (
                                                <tr key={idx}>
                                                    <td>
                                                        <span className={`severity-badge severity-${issue.severity}`}>
                                                            {issue.severity}
                                                        </span>
                                                    </td>
                                                    <td style={{fontFamily: 'monospace', color: '#94a3b8'}}>{issue.cpt_code}</td>
                                                    <td style={{color: '#cbd5e1'}}>{issue.issue_type.replace(/_/g, ' ')}</td>
                                                    <td>
                                                        <div style={{color: '#e2e8f0'}}>{issue.description}</div>
                                                        <div className="issue-details">{issue.details}</div>
                                                    </td>
                                                    <td className="flagged-amount">
                                                        {issue.potential_overcharge > 0 ?
                                                            `$${issue.potential_overcharge.toLocaleString('en-US', {minimumFractionDigits: 2})}` : '—'}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}

                                {activeTab === 'bill' && patientBill && (
                                    <table className="bill-table">
                                        <thead>
                                            <tr>
                                                <th>#</th>
                                                <th>Date</th>
                                                <th>CPT</th>
                                                <th>Description</th>
                                                <th>Qty</th>
                                                <th>Amount</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {patientBill.line_items.map((item, idx) => (
                                                <tr key={idx} className={flaggedIndices.has(idx) ? 'flagged' : ''}>
                                                    <td style={{color: '#64748b'}}>{idx + 1}</td>
                                                    <td>{item.date_of_service}</td>
                                                    <td style={{fontFamily: 'monospace'}}>{item.cpt_code}</td>
                                                    <td>{item.description}</td>
                                                    <td>{item.quantity}</td>
                                                    <td style={{fontFamily: 'monospace'}}>
                                                        ${(item.charge_amount * item.quantity).toLocaleString('en-US', {minimumFractionDigits: 2})}
                                                    </td>
                                                </tr>
                                            ))}
                                            <tr style={{borderTop: '2px solid #1e293b'}}>
                                                <td colSpan="5" style={{textAlign: 'right', fontWeight: 700, color: '#f8fafc'}}>
                                                    TOTAL BILLED
                                                </td>
                                                <td style={{fontFamily: 'monospace', fontWeight: 700, color: '#f8fafc'}}>
                                                    ${patientBill.total_billed.toLocaleString('en-US', {minimumFractionDigits: 2})}
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                )}

                                {activeTab === 'dispute' && (
                                    <div className="preformatted">{report.dispute_letter}</div>
                                )}

                                {activeTab === 'phone' && (
                                    <div className="preformatted">{report.phone_script}</div>
                                )}

                                {activeTab === 'answer-key' && (
                                    <>
                                        <p style={{color: '#94a3b8', marginBottom: 16, fontSize: '0.9rem'}}>
                                            These are the intentional billing errors embedded in this synthetic bill for demo purposes.
                                        </p>
                                        <ul className="answer-key">
                                            {knownErrors.map((err, idx) => (
                                                <li key={idx}>{err}</li>
                                            ))}
                                        </ul>
                                    </>
                                )}
                            </div>
                        </>
                    )}

                    <div style={{textAlign: 'center', padding: '40px 0 20px', color: '#475569', fontSize: '0.85rem'}}>
                        MedClear &mdash; The LLM reads the bill. Pure logic checks the rules. The verification cannot hallucinate.
                    </div>
                    </>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
